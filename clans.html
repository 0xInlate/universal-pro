<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Pro | Clans</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4d94;
            --primary-glow: rgba(255, 77, 148, 0.4);
            --gold: #ffd700;
            --bg: #080710;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
            --success: #00ff88;
            --card-bg: rgba(20, 20, 30, 0.8);
            --text-secondary: #777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 10%, #1a1025 0%, #080710 100%);
        }

        /* Сайдбар */
        .sidebar {
            width: 240px;
            background: rgba(0, 0, 0, 0.85);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            backdrop-filter: blur(20px);
            z-index: 1000;
        }

        .sidebar-logo {
            font-weight: 900;
            color: var(--primary);
            text-align: center;
            margin-bottom: 35px;
            font-size: 1.3rem;
            text-shadow: 0 0 10px rgba(255, 77, 148, 0.3);
        }

        .nav-item {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: #777;
            font-weight: 600;
            text-decoration: none;
            background: none;
            border: none;
            text-align: left;
            font-size: 1rem;
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--glass);
            color: white;
            border-left: 4px solid var(--primary);
        }

        /* Основной контент */
        main {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
        }

        .screen {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Заголовок страницы */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .create-btn {
            background: linear-gradient(45deg, var(--primary), #ff7bb3);
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            color: white;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        .create-btn:hover {
            transform: scale(1.05);
        }

        /* Поиск */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .search-bar button {
            background: var(--primary);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            color: white;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar button:hover {
            filter: brightness(1.2);
        }

        /* Сетка кланов */
        .clans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .clan-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .clan-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 77, 148, 0.2);
        }

        .clan-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .clan-avatar {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .clan-info {
            flex: 1;
        }

        .clan-name {
            font-weight: 900;
            font-size: 1.2rem;
        }

        .clan-tag {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .clan-stats {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .clan-stats i {
            color: var(--primary);
            margin-right: 5px;
        }

        /* Детальный вид клана */
        .clan-detail {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .clan-detail-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .clan-detail-avatar {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            border: 3px solid var(--primary);
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
        }

        .clan-detail-avatar:hover {
            opacity: 0.8;
        }

        .clan-detail-info {
            flex: 1;
        }

        .clan-detail-name {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .clan-detail-tag {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .clan-detail-description {
            margin-top: 10px;
            color: #aaa;
            font-size: 0.95rem;
        }

        .clan-detail-stats {
            display: flex;
            gap: 30px;
            margin-top: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Список участников */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .member-card:hover {
            border-color: var(--primary);
        }

        .member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 900;
            font-size: 0.9rem;
        }

        .member-role {
            font-size: 0.7rem;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
        }

        .member-role.leader {
            color: var(--gold);
        }

        /* Кнопки управления */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 40px;
            border: none;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), #ff7bb3);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
        }

        .btn-danger {
            background: rgba(255, 77, 77, 0.2);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Заявки */
        .requests-section {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .request-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .request-item:last-child {
            border-bottom: none;
        }

        .request-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .request-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
        }

        .request-actions {
            display: flex;
            gap: 10px;
        }

        .request-actions button {
            padding: 6px 15px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .accept-btn {
            background: var(--success);
            color: black;
        }

        .decline-btn {
            background: #ff4d4d;
            color: white;
        }

        /* Модалки */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal {
            background: #151520;
            padding: 35px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            text-align: center;
            min-width: 380px;
        }

        .modal h3 {
            font-weight: 900;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .modal input, .modal textarea, .modal select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        .modal textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal select option {
            background: #252535;
        }

        .modal .m-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* Прелоадер */
        .loader {
            text-align: center;
            padding: 40px;
            color: #777;
        }

        /* Аватарка загрузка */
        #clan-avatar-input {
            display: none;
        }

        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОНЫ ===== */
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 10px;
                gap: 5px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-logo {
                font-size: 1rem;
                margin-bottom: 0;
                margin-right: 10px;
                white-space: nowrap;
            }
            .nav-item {
                padding: 8px 12px;
                margin-bottom: 0;
                white-space: nowrap;
                font-size: 0.8rem;
            }
            main {
                padding: 15px;
            }
            .page-header {
                flex-direction: column;
                gap: 10px;
            }
            .page-header h1 {
                font-size: 1.6rem;
            }
            .create-btn {
                width: 100%;
            }
            .search-bar {
                flex-direction: column;
            }
            .search-bar button {
                width: 100%;
            }
            .clans-grid {
                grid-template-columns: 1fr;
            }
            .clan-detail-header {
                flex-direction: column;
                text-align: center;
            }
            .clan-detail-stats {
                justify-content: center;
            }
            .members-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .modal {
                min-width: auto;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">UNIVERSAL PRO</div>
        <a href="menu.html" class="nav-item"><i class="fa-solid fa-user"></i> Профиль</a>
        <a href="play.html" class="nav-item"><i class="fa-solid fa-gamepad"></i> Играть</a>
        <a href="friends.html" class="nav-item"><i class="fa-solid fa-users"></i> Друзья</a>
        <a href="clans.html" class="nav-item active"><i class="fa-solid fa-shield-halved"></i> Кланы</a>
        <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Настройки</a>
        <div class="nav-item" style="margin-top: auto;" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Выход</div>
    </div>

    <main>
        <!-- Экран списка кланов -->
        <div id="scr-list" class="screen active">
            <div class="page-header">
                <h1>КЛАНЫ</h1>
                <button class="create-btn" onclick="openCreateClanModal()">СОЗДАТЬ КЛАН</button>
            </div>
            <div class="search-bar">
                <input type="text" id="clan-search" placeholder="Поиск по названию или тегу...">
                <button onclick="searchClans()">НАЙТИ</button>
            </div>
            <div class="clans-grid" id="clans-list">
                <div class="loader">Загрузка кланов...</div>
            </div>
        </div>

        <!-- Экран просмотра одного клана -->
        <div id="scr-detail" class="screen">
            <button class="btn btn-secondary" onclick="showList()" style="margin-bottom: 20px; width: fit-content;"><i class="fa-solid fa-arrow-left"></i> Назад</button>
            <div id="clan-detail-container"></div>
        </div>
    </main>

    <!-- Модалка создания клана (с паролем) -->
    <div id="create-clan-modal" class="modal-overlay">
        <div class="modal">
            <h3>СОЗДАТЬ КЛАН</h3>
            <input type="text" id="clan-name" placeholder="Название клана" maxlength="30">
            <input type="text" id="clan-tag" placeholder="Тег (например [ABC])" maxlength="6">
            <textarea id="clan-desc" placeholder="Описание клана (необязательно)"></textarea>
            <input type="password" id="clan-password" placeholder="Пароль для создания">
            <div class="m-btns">
                <button class="btn btn-primary" onclick="createClan()">СОЗДАТЬ</button>
                <button class="btn btn-secondary" onclick="closeCreateClanModal()">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- Модалка передачи лидерства -->
    <div id="transfer-modal" class="modal-overlay">
        <div class="modal">
            <h3>ПЕРЕДАТЬ ЛИДЕРСТВО</h3>
            <select id="transfer-select" style="margin-bottom: 20px;">
                <option value="">Выберите нового лидера</option>
            </select>
            <div class="m-btns">
                <button class="btn btn-primary" id="transfer-confirm">ПЕРЕДАТЬ</button>
                <button class="btn btn-secondary" onclick="closeModal('transfer-modal')">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- Модалка изменения роли -->
    <div id="role-modal" class="modal-overlay">
        <div class="modal">
            <h3>ИЗМЕНИТЬ РОЛЬ</h3>
            <select id="role-select">
                <option value="member">Участник</option>
                <option value="leader">Лидер (передать клан)</option>
            </select>
            <div class="m-btns" style="margin-top: 20px;">
                <button class="btn btn-primary" id="role-confirm">СОХРАНИТЬ</button>
                <button class="btn btn-secondary" onclick="closeModal('role-modal')">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- Скрытое поле для загрузки аватарки клана -->
    <input type="file" id="clan-avatar-input" accept="image/*">

    <script>
        const SUPABASE_URL = 'https://tkssxjolplmcfsbcjwme.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrc3N4am9scGxtY2ZzYmNqd21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjkwMzQsImV4cCI6MjA4NzYwNTAzNH0.ZQ978i3haK8pPOouvnH4sgK7dxFKRby_UfaOgzP1VvY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const currentUserId = localStorage.getItem('pro_user_id');
        if (!currentUserId) window.location.href = 'index.html';

        let currentUserProfile = null;
        let currentClanId = null;
        let currentClan = null;
        let currentMembers = [];
        let currentRequests = [];

        (async function() {
            await loadUserProfile();
            await loadClans();
        })();

        async function loadUserProfile() {
            const { data, error } = await supabase.from('profiles').select('username, avatar_data').eq('id', currentUserId).single();
            if (data) currentUserProfile = data;
        }

        async function loadClans(search = '') {
            const container = document.getElementById('clans-list');
            container.innerHTML = '<div class="loader">Загрузка...</div>';
            try {
                let query = supabase
                    .from('clans')
                    .select(`
                        *,
                        clan_members!inner(count)
                    `)
                    .order('created_at', { ascending: false });
                if (search) {
                    query = query.or(`name.ilike.%${search}%,tag.ilike.%${search}%`);
                }
                const { data: clans, error } = await query;
                if (error) throw error;
                if (!clans || clans.length === 0) {
                    container.innerHTML = '<div style="color:#444;text-align:center;">Кланов не найдено</div>';
                    return;
                }
                container.innerHTML = clans.map(c => `
                    <div class="clan-card" onclick="viewClan('${c.id}')">
                        <div class="clan-header">
                            <img src="${c.avatar_data || 'https://api.dicebear.com/7.x/identicon/svg?seed='+c.id}" class="clan-avatar">
                            <div class="clan-info">
                                <div class="clan-name">${c.name}</div>
                                <div class="clan-tag">${c.tag}</div>
                            </div>
                        </div>
                        <div class="clan-stats">
                            <span><i class="fa-solid fa-users"></i> ${c.clan_members?.[0]?.count || 0}/50</span>
                            <span><i class="fa-solid fa-crown" style="color:var(--gold);"></i> ${c.leader_id.substring(0,8)}...</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Ошибка загрузки кланов:', err);
                container.innerHTML = '<div style="color:#ff4d4d;">Ошибка загрузки данных</div>';
            }
        }

        window.searchClans = function() {
            const search = document.getElementById('clan-search').value.trim();
            loadClans(search);
        };

        window.viewClan = async function(clanId) {
            currentClanId = clanId;
            document.getElementById('scr-list').classList.remove('active');
            document.getElementById('scr-detail').classList.add('active');
            await loadClanDetail(clanId);
        };

        async function loadClanDetail(clanId) {
            const container = document.getElementById('clan-detail-container');
            container.innerHTML = '<div class="loader">Загрузка...</div>';
            try {
                const { data: clan, error: clanErr } = await supabase
                    .from('clans')
                    .select('*')
                    .eq('id', clanId)
                    .single();
                if (clanErr) throw clanErr;
                currentClan = clan;

                const { data: members, error: membersErr } = await supabase
                    .from('clan_members')
                    .select('*, profiles(*)')
                    .eq('clan_id', clanId);
                if (membersErr) throw membersErr;
                currentMembers = members || [];

                let requests = [];
                if (isCurrentUserLeader()) {
                    const { data: reqs, error: reqErr } = await supabase
                        .from('clan_requests')
                        .select('*, profiles(*)')
                        .eq('clan_id', clanId);
                    if (!reqErr) requests = reqs || [];
                }
                currentRequests = requests;

                renderClanDetail(clan, members, requests);
            } catch (err) {
                console.error('Ошибка загрузки деталей клана:', err);
                container.innerHTML = '<div style="color:#ff4d4d;">Ошибка загрузки данных</div>';
            }
        }

        function isCurrentUserLeader() {
            return currentMembers.some(m => m.user_id === currentUserId && m.role === 'leader');
        }

        function renderClanDetail(clan, members, requests) {
            const container = document.getElementById('clan-detail-container');
            const isLeader = isCurrentUserLeader();
            const isMember = members.some(m => m.user_id === currentUserId);
            const hasRequest = requests.some(r => r.user_id === currentUserId);

            const membersHtml = members.map(m => `
                <div class="member-card">
                    <img src="${m.profiles.avatar_data || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+m.profiles.username}" class="member-avatar">
                    <div class="member-info">
                        <div class="member-name">${m.profiles.username}</div>
                        <div class="member-role ${m.role}">${m.role === 'leader' ? '👑 ЛИДЕР' : ''}</div>
                    </div>
                    ${isLeader && m.user_id !== currentUserId ? `
                        <div class="member-actions">
                            <button class="btn btn-secondary" onclick="openRoleModal('${m.user_id}', '${m.role}')" style="padding:5px 10px; font-size:0.7rem;">Роль</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            const requestsHtml = requests.length ? `
                <div class="requests-section">
                    <h4 style="margin-bottom:15px;">ЗАЯВКИ (${requests.length})</h4>
                    ${requests.map(r => `
                        <div class="request-item">
                            <div class="request-user">
                                <img src="${r.profiles.avatar_data || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+r.profiles.username}" class="request-avatar">
                                <span>${r.profiles.username}</span>
                            </div>
                            <div class="request-actions">
                                <button class="accept-btn" onclick="handleRequest('${r.id}', 'accept')">✔</button>
                                <button class="decline-btn" onclick="handleRequest('${r.id}', 'decline')">✖</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            container.innerHTML = `
                <div class="clan-detail">
                    <div class="clan-detail-header">
                        <img src="${clan.avatar_data || 'https://api.dicebear.com/7.x/identicon/svg?seed='+clan.id}" class="clan-detail-avatar" onclick="${isLeader ? 'openAvatarUpload()' : ''}">
                        <div class="clan-detail-info">
                            <div class="clan-detail-name">${clan.name}</div>
                            <div class="clan-detail-tag">${clan.tag}</div>
                            <div class="clan-detail-description">${clan.description || 'Нет описания'}</div>
                            <div class="clan-detail-stats">
                                <div class="stat">
                                    <div class="stat-value">${members.length}</div>
                                    <div class="stat-label">участников</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-value">${new Date(clan.created_at).toLocaleDateString()}</div>
                                    <div class="stat-label">основан</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <h3 style="margin: 25px 0 15px;">УЧАСТНИКИ</h3>
                    <div class="members-grid">
                        ${membersHtml}
                    </div>
                    ${requestsHtml}
                    <div class="action-buttons">
                        ${!isMember && !hasRequest ? `
                            <button class="btn btn-primary" onclick="joinClan()">ПОДАТЬ ЗАЯВКУ</button>
                        ` : ''}
                        ${hasRequest ? `
                            <button class="btn btn-secondary" disabled>ЗАЯВКА ОТПРАВЛЕНА</button>
                        ` : ''}
                        ${isLeader ? `
                            <button class="btn btn-secondary" onclick="openAvatarUpload()">СМЕНИТЬ АВАТАРКУ</button>
                            <button class="btn btn-danger" onclick="openTransferModal()">ПЕРЕДАТЬ ЛИДЕРСТВО</button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        window.joinClan = async function() {
            if (!currentClanId) return;
            const { data: existing } = await supabase.from('clan_members').select('id').eq('user_id', currentUserId).maybeSingle();
            if (existing) {
                alert('Вы уже состоите в клане');
                return;
            }
            const { error } = await supabase.from('clan_requests').insert({
                clan_id: currentClanId,
                user_id: currentUserId
            });
            if (!error) {
                alert('Заявка отправлена!');
                await loadClanDetail(currentClanId);
            } else {
                alert('Ошибка: ' + error.message);
            }
        };

        window.handleRequest = async function(requestId, action) {
            if (action === 'accept') {
                const { data: req } = await supabase.from('clan_requests').select('*').eq('id', requestId).single();
                if (req) {
                    await supabase.from('clan_members').insert({
                        clan_id: req.clan_id,
                        user_id: req.user_id,
                        role: 'member'
                    });
                }
            }
            await supabase.from('clan_requests').delete().eq('id', requestId);
            await loadClanDetail(currentClanId);
        };

        let targetUserIdForRole = null;
        window.openRoleModal = function(userId, currentRole) {
            targetUserIdForRole = userId;
            document.getElementById('role-select').value = currentRole;
            document.getElementById('role-modal').style.display = 'flex';
        };

        document.getElementById('role-confirm').onclick = async function() {
            const newRole = document.getElementById('role-select').value;
            if (newRole === 'leader') {
                prepareTransferModal(targetUserIdForRole);
            } else {
                await supabase.from('clan_members').update({ role: 'member' }).eq('user_id', targetUserIdForRole).eq('clan_id', currentClanId);
            }
            closeModal('role-modal');
            await loadClanDetail(currentClanId);
        };

        function prepareTransferModal(selectedUserId) {
            const members = currentMembers.filter(m => m.user_id !== currentUserId);
            const select = document.getElementById('transfer-select');
            select.innerHTML = members.map(m => `<option value="${m.user_id}">${m.profiles.username}</option>`).join('');
            if (selectedUserId) {
                select.value = selectedUserId;
            }
            document.getElementById('transfer-modal').style.display = 'flex';
        }

        window.openTransferModal = function() {
            prepareTransferModal(null);
        };

        document.getElementById('transfer-confirm').onclick = async function() {
            const newLeaderId = document.getElementById('transfer-select').value;
            if (!newLeaderId) return;
            await supabase.from('clan_members').update({ role: 'member' }).eq('clan_id', currentClanId);
            await supabase.from('clan_members').update({ role: 'leader' }).eq('user_id', newLeaderId).eq('clan_id', currentClanId);
            await supabase.from('clans').update({ leader_id: newLeaderId }).eq('id', currentClanId);
            closeModal('transfer-modal');
            await loadClanDetail(currentClanId);
        };

        window.openAvatarUpload = function() {
            document.getElementById('clan-avatar-input').click();
        };

        document.getElementById('clan-avatar-input').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onloadend = async function() {
                await supabase.from('clans').update({ avatar_data: reader.result }).eq('id', currentClanId);
                await loadClanDetail(currentClanId);
            };
            reader.readAsDataURL(file);
        };

        window.openCreateClanModal = function() {
            document.getElementById('create-clan-modal').style.display = 'flex';
        };

        window.closeCreateClanModal = function() {
            document.getElementById('create-clan-modal').style.display = 'none';
        };

        window.createClan = async function() {
            const name = document.getElementById('clan-name').value.trim();
            const tag = document.getElementById('clan-tag').value.trim().toUpperCase();
            const desc = document.getElementById('clan-desc').value.trim() || null;
            const password = document.getElementById('clan-password').value.trim();

            if (password !== 'release') {
                alert('Неверный пароль!');
                return;
            }

            if (!name || !tag) {
                alert('Введите название и тег');
                return;
            }

            const { data: existing } = await supabase.from('clans').select('id').eq('tag', tag).maybeSingle();
            if (existing) {
                alert('Тег уже используется');
                return;
            }

            const { data: newClan, error } = await supabase.from('clans').insert({
                name,
                tag,
                description: desc,
                leader_id: currentUserId,
                max_members: 50
            }).select().single();

            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }

            await supabase.from('clan_members').insert({
                clan_id: newClan.id,
                user_id: currentUserId,
                role: 'leader'
            });

            closeCreateClanModal();
            await loadClans();
            viewClan(newClan.id);
        };

        window.showList = function() {
            document.getElementById('scr-detail').classList.remove('active');
            document.getElementById('scr-list').classList.add('active');
            currentClanId = null;
        };

        window.closeModal = function(modalId) {
            document.getElementById(modalId).style.display = 'none';
        };

        window.logout = function() {
            localStorage.removeItem('pro_user_id');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
