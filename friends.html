<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Pro | Friends</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4d94;
            --secondary: #24243e;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
            --xp-color: #00d2ff;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: #080710;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: rgba(0, 0, 0, 0.85);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .sidebar-logo {
            font-weight: 900; color: var(--primary); text-align: center;
            margin-bottom: 35px; font-size: 1.3rem; text-shadow: 0 0 10px rgba(255, 77, 148, 0.3);
        }

        .nav-item {
            width: 100%; padding: 14px 18px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; border-radius: 12px;
            cursor: pointer; transition: 0.3s; color: #777; font-weight: 600; text-decoration: none;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--glass); color: white; border-left: 4px solid var(--primary);
        }

        /* Main Layout */
        main {
            flex: 1;
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            background: radial-gradient(circle at 10% 10%, #1a1025 0%, #080710 100%);
            overflow-y: auto;
        }

        .section-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Search Section */
        .search-area { margin-bottom: 30px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; }

        .search-bar input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; color: white; outline: none; transition: 0.3s;
            font-weight: 600;
        }
        .search-bar input:focus { border-color: var(--primary); }

        .btn-search {
            background: var(--primary); border: none; padding: 0 25px;
            border-radius: 15px; color: white; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .btn-search:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* Preview Card */
        #search-preview {
            display: none; 
            background: linear-gradient(90deg, rgba(255, 77, 148, 0.1), rgba(255, 255, 255, 0.02));
            border: 1px solid var(--primary);
            padding: 20px; border-radius: 20px;
            align-items: center; gap: 20px;
            margin-top: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(-15px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Friends Grid */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .friend-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 18px; border-radius: 20px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .friend-card:hover { border-color: var(--xp-color); transform: scale(1.02); }

        .f-avatar { width: 55px; height: 55px; border-radius: 15px; object-fit: cover; border: 2px solid var(--primary); }
        .f-info h4 { font-size: 0.95rem; font-weight: 900; }
        .f-info p { font-size: 0.7rem; color: #555; font-weight: 600; }
        .f-elo { font-weight: 900; color: var(--xp-color); font-size: 1rem; }

        /* Requests Right Panel */
        .req-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            padding: 15px; border-radius: 18px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .btn-action { width: 35px; height: 35px; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .accept { background: var(--success); color: #000; }
        .decline { background: #ff4d4d; color: white; }
        .btn-action:hover { transform: scale(1.1); }

        /* Toasts */
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .toast {
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: 900; font-size: 0.8rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 10px;
            animation: toastIn 0.3s forwards;
        }
        @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОНЫ ===== */
        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 10px;
                gap: 5px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .sidebar-logo {
                font-size: 1rem;
                margin-bottom: 0;
                margin-right: 10px;
                white-space: nowrap;
            }
            .nav-item {
                padding: 8px 12px;
                margin-bottom: 0;
                white-space: nowrap;
                font-size: 0.8rem;
            }
            main {
                grid-template-columns: 1fr;
                padding: 15px;
            }
            .right-side {
                order: -1; /* заявки сверху на мобилке */
            }
            .search-bar {
                flex-direction: column;
            }
            .search-bar button {
                width: 100%;
                padding: 12px;
            }
            #search-preview {
                flex-direction: column;
                text-align: center;
            }
            .friend-card {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div class="sidebar">
        <div class="sidebar-logo">UNIVERSAL PRO</div>
        <a href="menu.html" class="nav-item"><i class="fa-solid fa-user"></i> Профиль</a>
        <a href="play.html" class="nav-item"><i class="fa-solid fa-gamepad"></i> Играть</a>
        <a href="friends.html" class="nav-item active"><i class="fa-solid fa-users"></i> Друзья</a>
        <a href="clans.html" class="nav-item"><i class="fa-solid fa-shield-halved"></i> Кланы</a>
        <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Настройки</a>
        <div class="nav-item" style="margin-top: auto;" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Выход</div>
    </div>

    <main>
        <div class="left-content">
            <div class="section-box">
                <div class="search-area">
                    <h3 style="margin-bottom: 15px; font-size: 0.75rem; color: var(--primary); font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">
                        <i class="fa-solid fa-magnifying-glass"></i> Поиск игрока по ID
                    </h3>
                    <div class="search-bar">
                        <input type="text" id="search-id" placeholder="Например: 12345678" oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="9">
                        <button class="btn-search" onclick="searchPlayer()">НАЙТИ</button>
                    </div>

                    <div id="search-preview">
                        <img id="p-avatar" src="" class="f-avatar">
                        <div style="flex: 1;">
                            <div id="p-nick" style="font-weight: 900; font-size: 1.2rem;">-</div>
                            <div id="p-id" style="font-size: 0.7rem; color: #777; font-weight: 600;">ID: -</div>
                        </div>
                        <div style="text-align: right;">
                            <div id="p-elo" style="color: var(--xp-color); font-weight: 900; font-size: 1.1rem; margin-bottom: 5px;">- ELO</div>
                            <button id="p-add-btn" class="btn-search" style="padding: 8px 15px; font-size: 0.7rem;">ДОБАВИТЬ</button>
                        </div>
                    </div>
                </div>

                <h2 style="font-weight: 900; letter-spacing: 1px; font-size: 1.2rem; display: flex; align-items: center; gap: 15px;">
                    <i class="fa-solid fa-user-group" style="color: var(--xp-color);"></i> МОИ ДРУЗЬЯ
                </h2>
                <div id="friends-list" class="friends-grid"></div>
            </div>
        </div>

        <div class="right-side">
            <div class="section-box" style="min-height: 100%;">
                <h3 style="margin-bottom: 25px; font-weight: 900; font-size: 0.85rem; letter-spacing: 1px; color: var(--primary);">
                    <i class="fa-solid fa-bell"></i> ЗАЯВКИ В ДРУЗЬЯ
                </h3>
                <div id="requests-list"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://tkssxjolplmcfsbcjwme.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrc3N4am9scGxtY2ZzYmNqd21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjkwMzQsImV4cCI6MjA4NzYwNTAzNH0.ZQ978i3haK8pPOouvnH4sgK7dxFKRby_UfaOgzP1VvY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const currentId = localStorage.getItem('pro_user_id');
        if (!currentId) window.location.href = 'index.html';

        let currentSearchTarget = null;

        function showToast(text) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = text;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 2500);
        }

        async function searchPlayer() {
            const skId = document.getElementById('search-id').value.trim();
            const preview = document.getElementById('search-preview');
            if (!skId) return;

            const { data: player } = await _supabase.from('profiles').select('*').eq('sk_id', skId).single();

            if (!player) {
                showToast("Игрок не найден");
                preview.style.display = 'none';
                return;
            }

            currentSearchTarget = player.id;
            document.getElementById('p-avatar').src = player.avatar_data || `https://api.dicebear.com/7.x/avataaars/svg?seed=${player.username}`;
            document.getElementById('p-nick').innerText = player.username;
            document.getElementById('p-id').innerText = `ID: ${player.sk_id}`;
            document.getElementById('p-elo').innerText = `${player.elo || 0} ELO`;
            
            preview.style.display = 'flex';
            document.getElementById('p-add-btn').onclick = sendRequest;
        }

        async function sendRequest() {
            if (currentSearchTarget === currentId) { showToast("Это ваш ID"); return; }

            const { error } = await _supabase.from('friend_requests').insert([{ from_id: currentId, to_id: currentSearchTarget }]);

            if (error) showToast("Запрос уже отправлен");
            else {
                showToast("Запрос отправлен!");
                document.getElementById('search-preview').style.display = 'none';
                document.getElementById('search-id').value = '';
            }
        }

        async function loadRequests() {
            const { data: reqs } = await _supabase.from('friend_requests').select('id, from_id, profiles:from_id(username, sk_id)').eq('to_id', currentId);
            const container = document.getElementById('requests-list');

            if (!reqs || reqs.length === 0) {
                container.innerHTML = '<div style="color: #444; text-align: center; font-size: 0.75rem; margin-top: 20px;">НЕТ НОВЫХ ЗАПРОСОВ</div>';
                return;
            }

            container.innerHTML = reqs.map(r => `
                <div class="req-card">
                    <div>
                        <div style="font-weight:900; font-size:0.85rem;">${r.profiles.username}</div>
                        <div style="font-size:0.65rem; color:#555;">ID: ${r.profiles.sk_id}</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-action accept" onclick="acceptFriend('${r.id}', '${r.from_id}')"><i class="fa-solid fa-check"></i></button>
                        <button class="btn-action decline" onclick="declineFriend('${r.id}')"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function acceptFriend(reqId, friendUuid) {
            const { error } = await _supabase.from('friends').insert([
                { user_id: currentId, friend_id: friendUuid },
                { user_id: friendUuid, friend_id: currentId }
            ]);
            
            if (!error) {
                await _supabase.from('friend_requests').delete().eq('id', reqId);
                showToast("Друг добавлен!");
                init();
            }
        }

        async function declineFriend(reqId) {
            await _supabase.from('friend_requests').delete().eq('id', reqId);
            loadRequests();
        }

        async function loadFriends() {
            const { data: friends } = await _supabase.from('friends').select('profiles:friend_id(username, avatar_data, sk_id, elo)').eq('user_id', currentId);
            const list = document.getElementById('friends-list');

            if (!friends || friends.length === 0) {
                list.innerHTML = '<p style="color: #444; grid-column: 1/-1; text-align: center; margin-top: 40px; font-weight: 600;">ВАШ СПИСОК ДРУЗЕЙ ПУСТ</p>';
                return;
            }

            list.innerHTML = friends.map(f => `
                <div class="friend-card">
                    <img src="${f.profiles.avatar_data || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+f.profiles.username}" class="f-avatar">
                    <div class="f-info">
                        <h4>${f.profiles.username}</h4>
                        <p>ID: ${f.profiles.sk_id}</p>
                    </div>
                    <div style="margin-left: auto; text-align: right;">
                        <div class="f-elo">${f.profiles.elo || 0}</div>
                        <span style="font-size:0.5rem; color:var(--success); font-weight:900;">ONLINE</span>
                    </div>
                </div>
            `).join('');
        }

        function logout() { localStorage.removeItem('pro_user_id'); window.location.href = 'index.html'; }
        function init() { loadRequests(); loadFriends(); }

        init();
        setInterval(init, 10000);
    </script>
</body>
</html>
